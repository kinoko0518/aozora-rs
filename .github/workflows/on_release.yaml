name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-ayame-cli:
    name: Build ayame-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ayame-cli-linux-x86_64
            binary: ayame
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ayame-cli-macos-aarch64
            binary: ayame
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ayame-cli-windows-x86_64.exe
            binary: ayame.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build ayame-cli
        run: cargo build --release --bin ayame --target ${{ matrix.target }}

      - name: Rename binary for release
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-ayame-app:
    name: Build ayame-app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ayame-app-linux-x86_64
            binary: ayame-app
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ayame-app-macos-aarch64
            binary: ayame-app
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ayame-app-windows-x86_64.exe
            binary: ayame-app.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libxcb1-dev libxkbcommon-x11-dev libwayland-dev libxkbcommon-dev libvulkan-dev

      - name: Build ayame-app
        run: cargo build --release --bin ayame-app --target ${{ matrix.target }}

      - name: Rename binary for release
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Build WASM
        run: wasm-pack build ./applications/wasm --target bundler

      - name: Zip pkg directory
        run: |
          cd applications/wasm/pkg
          zip -r ../aozora-rs-wasm-pkg.zip .

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: aozora-rs-wasm-pkg
          path: applications/wasm/aozora-rs-wasm-pkg.zip

  build-and-upload:
    name: Upload Release
    runs-on: ubuntu-latest
    needs: [build-wasm, build-ayame-cli, build-ayame-app]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/aozora-rs-wasm-pkg/*
            release-artifacts/ayame-cli-*/*
            release-artifacts/ayame-app-*/*

name: CI and Pages Deploy

on: [push]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # QAを実行
  qa:
    name: Run QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Create result directory
        run: mkdir -p ./aozora-rs/aozora-rs-qa/result

      - name: Install system dependencies
        run: |
          echo ttf-mscorefonts-installer msttcorefonts/accepted-mscorefonts-eula select true | sudo debconf-set-selections;
          sudo apt-get update;
          sudo apt-get install ttf-mscorefonts-installer libfontconfig-dev;

      - name: Run QA
        run: cargo run --bin qa

      - name: Upload QA result
        uses: actions/upload-artifact@v4
        with:
          name: qa-result
          path: aozora-rs/aozora-rs-qa/result/

  # ayame-demo用のWASMビルド
  build-demo:
    name: Build ayame-demo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Build WASM for demo
        run: |
          wasm-pack build ./aozora-rs/aozora-rs-wasm --target web --out-dir ../../ayame/ayame-demo/pkg

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-site
          path: ./ayame/ayame-demo/

  # QAジョブ完了後、TypstからPDFを生成しアップロード
  build-typst:
    name: Build Typst Document
    runs-on: ubuntu-latest
    needs: qa
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download QA result
        uses: actions/download-artifact@v4
        with:
          name: qa-result
          path: aozora-rs/aozora-rs-qa/result

      - name: Setup Typst
        uses: typst-community/setup-typst@v3

      - name: Compile Typst presentation
        run: typst compile ./docs/typst/presentation.typ --root . ./presentation.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: typst-pdf
          path: ./presentation.pdf

  # ayame-demoとTypstの結果を合成してデプロイ
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build-demo, build-typst]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download demo site
        uses: actions/download-artifact@v4
        with:
          name: demo-site
          path: ./pages-deploy

      - name: Download Typst PDF
        uses: actions/download-artifact@v4
        with:
          name: typst-pdf
          path: ./pages-deploy

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./pages-deploy"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  qa:
    name: Run QA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Create result directory
        run: mkdir -p ./aozora-rs-qa/result

      - name: Run QA
        run: cargo run --bin qa

      - name: Upload QA result
        uses: actions/upload-artifact@v4
        with:
          name: qa-result
          path: aozora-rs-qa/result/

  build-ayame-cli:
    name: Build ayame-cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ayame-cli-linux-x86_64
            binary: ayame
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ayame-cli-macos-aarch64
            binary: ayame
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ayame-cli-windows-x86_64.exe
            binary: ayame.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build ayame-cli
        run: cargo build --release --bin ayame --target ${{ matrix.target }}

      - name: Rename binary for release
        run: mv target/${{ matrix.target }}/release/${{ matrix.binary }} target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-ayame-app:
    name: Build ayame-app (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        include:
          - platform: ubuntu-22.04
            artifact-name: ayame-app-linux-x86_64
          - platform: macos-latest
            artifact-name: ayame-app-macos-aarch64
          - platform: windows-latest
            artifact-name: ayame-app-windows-x86_64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        working-directory: ayame-app
        run: npm ci

      - name: Disable macOS background processes
        if: matrix.platform == 'macos-latest'
        run: |
          sudo mdutil -i off -a || true
          sudo killall mds mdssync mds_stores || true
          sudo pkill -9 XProtect || true

      - name: Build ayame-app (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ayame-app

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.nsis

  build-ayame-app-android:
    name: Build ayame-app (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;29.0.14033849"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        working-directory: ayame-app
        run: npm ci

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli -y

      - name: Decode Android keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > ayame-app/src-tauri/gen/android/app/release.jks
          cat <<EOF > ayame-app/src-tauri/gen/android/keystore.properties
          storeFile=release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build ayame-app Android
        uses: tauri-apps/tauri-action@dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14033849
        with:
          projectPath: ayame-app
          mobile: android

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayame-app-android
          path: |
            ayame-app/src-tauri/gen/android/app/build/outputs/**/*.apk
            ayame-app/src-tauri/gen/android/app/build/outputs/**/*.aab

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "latest"

      - name: Build WASM
        run: wasm-pack build aozora-rs-wasm --target bundler

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: aozora-rs-wasm-pkg
          path: aozora-rs-wasm/pkg/

  build-and-upload:
    name: Upload Release
    runs-on: ubuntu-latest
    needs:
      [
        qa,
        build-wasm,
        build-ayame-cli,
        build-ayame-app,
        build-ayame-app-android,
      ]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/aozora-rs-wasm-pkg/*
            release-artifacts/qa-result/*
            release-artifacts/ayame-cli-*/*
            release-artifacts/ayame-app-*/**/*.deb
            release-artifacts/ayame-app-*/**/*.AppImage
            release-artifacts/ayame-app-*/**/*.dmg
            release-artifacts/ayame-app-*/**/*.msi
            release-artifacts/ayame-app-*/**/*.exe
            release-artifacts/ayame-app-*/**/*.nsis
            release-artifacts/ayame-app-android/**/*.apk
            release-artifacts/ayame-app-android/**/*.aab
